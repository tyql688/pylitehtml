<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Bundled fonts live in this directory (resolved relative to this file). -->
  <dir prefix="relative">.</dir>

  <!-- Use a per-user, writable cache (XDG: $XDG_CACHE_HOME or ~/.cache).
       The previous "cache" subdir lived inside the install location, which is
       read-only for normal site-packages installs — fontconfig then failed to
       write and rescanned every run. -->
  <cachedir prefix="xdg">pylitehtml-fonts</cachedir>

  <!-- Map the CSS generic families to bundled fonts so text renders even on
       minimal systems with no system fonts (e.g. slim Docker/CI images).
       Note: no true serif/monospace font is bundled yet — these fall back to
       the sans faces to avoid tofu (missing-glyph boxes). -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans</family>
      <family>DejaVu Sans</family>
      <family>Noto Sans SC</family>
    </prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Sans</family>
      <family>DejaVu Sans</family>
      <family>Noto Sans SC</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>DejaVu Sans</family>
      <family>Noto Sans</family>
      <family>Noto Sans SC</family>
    </prefer>
  </alias>

  <!-- Pin CJK fallback: whenever the default "Noto Sans" is requested, append
       "Noto Sans SC" so Chinese glyphs resolve to the bundled font with a fixed
       priority, regardless of any system CJK font that might otherwise win. -->
  <match target="pattern">
    <test name="family"><string>Noto Sans</string></test>
    <edit name="family" mode="append" binding="weak">
      <string>Noto Sans SC</string>
    </edit>
  </match>
</fontconfig>
