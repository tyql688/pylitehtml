name: Test
on: [push, pull_request]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - uses: actions/setup-python@v6
        with: { python-version: "${{ matrix.python }}" }

      - name: System deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libfontconfig1-dev \
            libwebp-dev libjpeg-turbo8-dev cmake ninja-build

      - name: System deps (macOS)
        if: runner.os == 'macOS'
        run: brew install --quiet cairo pango fontconfig webp jpeg-turbo cmake ninja 2>/dev/null || true

      - name: Build and test
        run: |
          pip install scikit-build-core pybind11 pytest pillow
          pip install -e . --no-build-isolation
          pytest tests/ -v

  test-windows:
    runs-on: windows-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }

      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }

      - name: Export GitHub Actions cache for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install vcpkg deps
        run: |
          vcpkg install cairo pango fontconfig libwebp libjpeg-turbo pkgconf --triplet x64-windows
        shell: pwsh

      - name: Configure build environment
        run: |
          $installed = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows"
          Add-Content $env:GITHUB_PATH "$installed\tools\pkgconf"
          Add-Content $env:GITHUB_PATH "$installed\bin"
          Add-Content $env:GITHUB_ENV "PKG_CONFIG_PATH=$installed\lib\pkgconfig"
          $toolchain = "$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"
          Add-Content $env:GITHUB_ENV "SKBUILD_CMAKE_ARGS=-DCMAKE_TOOLCHAIN_FILE=$toolchain"
        shell: pwsh

      - name: Build and test
        run: |
          pip install scikit-build-core pybind11 pytest pillow
          pip install -e . --no-build-isolation
          pytest tests/ -v
        shell: pwsh
