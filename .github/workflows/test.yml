name: Test
on:
  push:
    branches: ["**"]   # all branch pushes; tag pushes are handled by wheels.yml
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Pin ruff so a silent upstream bump can't change format rules and break CI;
      # keep in sync with the version used locally (uvx ruff@<version>).
      - uses: astral-sh/ruff-action@v3
        with: { args: "check --output-format=github", version: "0.15.16" }
      - uses: astral-sh/ruff-action@v3
        with: { args: "format --check", version: "0.15.16" }

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10"]
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - uses: actions/setup-python@v6
        with: { python-version: "${{ matrix.python }}" }

      - name: System deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libfontconfig1-dev \
            libwebp-dev libjpeg-turbo8-dev libssl-dev cmake ninja-build

      - name: System deps (macOS)
        if: runner.os == 'macOS'
        run: brew install --quiet cairo pango fontconfig webp jpeg-turbo openssl@3 cmake ninja 2>/dev/null || true

      - name: Build and test
        run: |
          pip install scikit-build-core pybind11
          pip install -e ".[dev]" --no-build-isolation   # pytest/pillow/numpy/…
          pytest tests/ -v

  test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python: ["3.10"]
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }

      - uses: actions/setup-python@v6
        with: { python-version: "${{ matrix.python }}" }

      - name: Setup vcpkg
        uses: ./.github/actions/setup-vcpkg-win

      - name: Build wheel and bundle DLLs with delvewheel
        run: |
          $env:PATH = "$env:VCPKG_BIN;$env:PATH"
          pip install scikit-build-core pybind11 delvewheel
          pip wheel . --no-build-isolation -w dist\
          delvewheel repair (Get-ChildItem dist\pylitehtml*.whl | Select-Object -First 1 -ExpandProperty FullName) `
            -w dist-repaired\ --add-path "$env:VCPKG_BIN"
          # Install the repaired wheel with the [dev] extra so test deps
          # (pytest/pillow/numpy/pytest-asyncio) stay in sync with pyproject.toml.
          $whl = Get-ChildItem dist-repaired\pylitehtml*.whl | Select-Object -First 1 -ExpandProperty FullName
          pip install "$whl[dev]"
          pytest tests\ -v
        shell: pwsh
