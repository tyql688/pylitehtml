name: Test
on: [push, pull_request]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - uses: actions/setup-python@v6
        with: { python-version: "${{ matrix.python }}" }

      - name: System deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libfontconfig1-dev \
            libwebp-dev libjpeg-turbo8-dev cmake ninja-build

      - name: System deps (macOS)
        if: runner.os == 'macOS'
        run: brew install --quiet cairo pango fontconfig webp jpeg-turbo cmake ninja 2>/dev/null || true

      - name: Build and test
        run: |
          pip install scikit-build-core pybind11 pytest pillow
          pip install -e . --no-build-isolation
          pytest tests/ -v

  test-windows:
    runs-on: windows-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }

      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }

      - name: Enable vcpkg binary cache (x-gha)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "b02e341c927f16d991edbd915d8ea43eac52096c"  # 2025.01.16
          vcpkgDirectory: "${{ runner.workspace }}/b/vcpkg"
          # Don't use runVcpkgInstall: the glob "**/vcpkg.json" hits hundreds of
          # port files inside vcpkg itself and never installs our packages.
          # We run vcpkg install explicitly below.

      - name: Install vcpkg dependencies
        run: |
          $exe = Join-Path "${{ runner.workspace }}" "b\vcpkg\vcpkg.exe"
          & $exe install cairo pango fontconfig libwebp libjpeg-turbo pkgconf --triplet x64-windows
        shell: pwsh

      - name: Configure build environment
        run: |
          $vcpkg     = Join-Path "${{ runner.workspace }}" "b\vcpkg"
          $installed = Join-Path $vcpkg "installed\x64-windows"
          $bin       = Join-Path $installed "bin"
          $pkgconf   = Join-Path $installed "tools\pkgconf"
          $toolchain = Join-Path $vcpkg "scripts\buildsystems\vcpkg.cmake"
          Write-Host "vcpkg bin exists: $(Test-Path $bin)"
          Write-Host "DLL count: $((Get-ChildItem $bin -Filter '*.dll' -ErrorAction SilentlyContinue).Count)"
          Add-Content $env:GITHUB_PATH $pkgconf
          Add-Content $env:GITHUB_PATH $bin
          Add-Content $env:GITHUB_ENV "PKG_CONFIG_PATH=$(Join-Path $installed 'lib\pkgconfig')"
          Add-Content $env:GITHUB_ENV "VCPKG_BIN=$bin"
          Add-Content $env:GITHUB_ENV "SKBUILD_CMAKE_ARGS=-DCMAKE_TOOLCHAIN_FILE=$toolchain"
        shell: pwsh

      - name: Build wheel and bundle DLLs with delvewheel
        run: |
          $env:PATH = "$env:VCPKG_BIN;$env:PATH"
          pip install scikit-build-core pybind11 delvewheel pytest pillow
          pip wheel . --no-build-isolation -w dist\
          delvewheel repair (Get-ChildItem dist\pylitehtml*.whl | Select-Object -First 1 -ExpandProperty FullName) `
            -w dist-repaired\ --add-path "$env:VCPKG_BIN"
          pip install (Get-ChildItem dist-repaired\pylitehtml*.whl | Select-Object -First 1 -ExpandProperty FullName)
          pytest tests\ -v
        shell: pwsh
