name: Build Wheels
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Wheels ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        run: |
          $vcpkg = Join-Path "${{ runner.workspace }}" "b\vcpkg"
          git clone --depth 1 https://github.com/microsoft/vcpkg.git $vcpkg
          & (Join-Path $vcpkg "bootstrap-vcpkg.bat") -disableMetrics
          Add-Content $env:GITHUB_ENV "VCPKG_ROOT=$vcpkg"
        shell: pwsh

      - name: vcpkg deps (Windows)
        if: runner.os == 'Windows'
        run: |
          & (Join-Path "$env:VCPKG_ROOT" "vcpkg.exe") install --triplet x64-windows
        shell: pwsh

      - name: Configure Windows build environment
        if: runner.os == 'Windows'
        run: |
          $installed = Join-Path "$env:VCPKG_ROOT" "installed\x64-windows"
          $bin       = Join-Path $installed "bin"
          $pkgconf   = Join-Path $installed "tools\pkgconf"
          $toolchain = Join-Path "$env:VCPKG_ROOT" "scripts\buildsystems\vcpkg.cmake"
          Add-Content $env:GITHUB_PATH $pkgconf
          Add-Content $env:GITHUB_PATH $bin
          Add-Content $env:GITHUB_ENV "PKG_CONFIG_PATH=$(Join-Path $installed 'lib\pkgconfig')"
          Add-Content $env:GITHUB_ENV "VCPKG_BIN=$bin"
          Add-Content $env:GITHUB_ENV "SKBUILD_CMAKE_ARGS=-DCMAKE_TOOLCHAIN_FILE=$toolchain"
        shell: pwsh

      - name: Pre-cache virtualenv for cibuildwheel
        run: |
          VENV_VER="20.30.0"
          URL="https://github.com/pypa/get-virtualenv/blob/${VENV_VER}/public/virtualenv.pyz?raw=true"
          if [ "$RUNNER_OS" = "macOS" ]; then
            CACHE_DIR="$HOME/Library/Caches/cibuildwheel"
          elif [ "$RUNNER_OS" = "Windows" ]; then
            CACHE_DIR="$LOCALAPPDATA/pypa/cibuildwheel/Cache"
          else
            CACHE_DIR="$HOME/.cache/cibuildwheel"
          fi
          mkdir -p "$CACHE_DIR"
          DEST="$CACHE_DIR/virtualenv-${VENV_VER}.pyz"
          if [ -f "$DEST" ]; then
            echo "Already cached: $DEST"
          else
            curl -fsSL --retry 5 --retry-delay 15 -o "$DEST" "$URL"
            echo "Downloaded to $DEST"
          fi
        shell: bash

      - name: Install delvewheel (Windows)
        if: runner.os == 'Windows'
        run: pip install delvewheel

      - uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_MACOS: "arm64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: |
            yum install -y cairo-devel pango-devel fontconfig-devel \
              libwebp-devel libjpeg-turbo-devel
          CIBW_BEFORE_ALL_MACOS: >
            brew install cairo pango fontconfig webp jpeg-turbo pkg-config 2>/dev/null || true
          CIBW_REPAIR_WHEEL_COMMAND_LINUX:   "auditwheel repair -w {dest_dir} {wheel}"
          CIBW_REPAIR_WHEEL_COMMAND_MACOS:   "delocate-wheel --require-target-macos-version 15.0 -w {dest_dir} {wheel}"
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            delvewheel repair -w {dest_dir} {wheel}
            --add-path "%VCPKG_BIN%"
          CIBW_TEST_REQUIRES: "pytest pillow pytest-asyncio"
          CIBW_TEST_COMMAND: "pytest {project}/tests/test_basic.py {project}/tests/test_async.py -v"

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  publish:
    needs: build_wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions: { id-token: write }
    steps:
      - uses: actions/download-artifact@v8
        with: { pattern: wheels-*, merge-multiple: true, path: dist/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
