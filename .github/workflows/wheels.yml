name: Build Wheels
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Wheels ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        run: |
          $vcpkg = Join-Path "${{ runner.workspace }}" "b\vcpkg"
          git clone --depth 1 https://github.com/microsoft/vcpkg.git $vcpkg
          & (Join-Path $vcpkg "bootstrap-vcpkg.bat") -disableMetrics
          Add-Content $env:GITHUB_ENV "VCPKG_ROOT=$vcpkg"
        shell: pwsh

      - name: vcpkg deps (Windows)
        if: runner.os == 'Windows'
        run: |
          & (Join-Path "$env:VCPKG_ROOT" "vcpkg.exe") install --triplet x64-windows-static
        shell: pwsh

      - uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_MACOS: "arm64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: |
            yum install -y cairo-devel pango-devel fontconfig-devel \
              libwebp-devel libjpeg-turbo-devel
          CIBW_BEFORE_ALL_MACOS: >
            brew install cairo pango fontconfig webp jpeg-turbo pkg-config 2>/dev/null || true
          CIBW_REPAIR_WHEEL_COMMAND_LINUX:   "auditwheel repair -w {dest_dir} {wheel}"
          CIBW_REPAIR_WHEEL_COMMAND_MACOS:   "delocate-wheel -w {dest_dir} {wheel}"
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair -w {dest_dir} {wheel}"
          CIBW_TEST_REQUIRES: "pytest pillow pytest-asyncio"
          CIBW_TEST_COMMAND: "pytest {project}/tests/test_basic.py {project}/tests/test_async.py -v"

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  publish:
    needs: build_wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions: { id-token: write }
    steps:
      - uses: actions/download-artifact@v8
        with: { pattern: wheels-*, merge-multiple: true, path: dist/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
